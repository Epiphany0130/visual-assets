server:
  port: 8456 # 端口号
  servlet:
    context-path: /api # 上下文路径
spring:
  profiles:
    active: local # 激活的配置文件
  application:
    name: visual-assets # 项目名称
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver # 数据库驱动
    url: jdbc:mysql://118.31.62.68:3306/VisualAssets # 数据库地址
    username: ${DB_USERNAME} # 数据库用户名
    password: ${DB_PASSWORD} # 数据库密码
    # 开放更大的文件上传体积
    servlet:
      multipart:
        max-file-size: 10MB

# mybatis-plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false # 下划线转驼峰命名
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # SQL日志打印 仅在开发环境使用
  global-config:
    db-config:
      logic-delete-field: isDelete # 逻辑删除字段
      logic-delete-value: 1 # 逻辑删除值
      logic-not-delete-value: 0 # 非逻辑删除值

# springdoc-openapi 项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html # Swagger UI 访问路径
    tags-sorter: alpha # 标签排序方式
    operations-sorter: alpha # 操作排序方式
  api-docs:
    path: /v3/api-docs # API 文档访问路径
  group-configs:
    - group: 'default' # 分组名称
      paths-to-match: '/**' # 匹配的路径
      packages-to-scan: com.gyqstd.visualassets.controller # 扫描的包路径

# knife4j 的增强配置
knife4j:
  enable: true # 启用 Knife4j
  setting:
    language: zh_cn # 设置界面语言为中文

# 对象存储配置（需要从腾讯云获取）
cos:
  client:
    host: ${COS_HOST} # 对象存储访问域名
    secretId: ${COS_SECRET_ID} # 对象存储SecretId
    secretKey: ${COS_SECRET_KEY} # 对象存储SecretKey
    region: ${COS_REGION} # 对象存储地域
    bucket: ${COS_BUCKET} # 对象存储桶名称